<!-- Swiper JS -->
<script src="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.js"></script>

<script>
new Swiper('.swiper', {
  loop: true,
  centeredSlides: true,
  slidesPerView: 3,

  autoplay: {
    delay: 3000,
    disableOnInteraction: false
  },

  effect: 'coverflow',

  coverflowEffect: {
    rotate: 60,
    stretch: 0,
    depth: 200,
    modifier: 1,
    slideShadows: false
  },

  navigation: {
    nextEl: '.swiper-button-next',
    prevEl: '.swiper-button-prev'
  },

  pagination: {
    el: '.swiper-pagination',
    clickable: true
  }
});
</script>
